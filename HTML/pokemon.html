<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/menu.css">
    <link rel="stylesheet" href="../CSS/pokemon.css">

    </header>

        </div>

                <div class="titulo">
                    <h2>Como funciona o PokéAPI</h2>
